name: final-project-rag

services:
  ollama:
    image: ollama/ollama:latest
    gpus: all
    container_name: final-project-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    command: ["ollama", "serve"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

volumes:
  ollama_models:
